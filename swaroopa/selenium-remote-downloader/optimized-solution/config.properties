# ========================================
# Remote File Download Configuration
# ========================================

# Grid Configuration
grid.url=http://localhost:4444/wd/hub

# Local Download Path (where files will be saved)
local.download.path=./downloads

# Timeout in seconds to wait for file download
download.timeout=60

# Remote Download Path on Grid Node (where files download on remote machine)
remote.download.path=/tmp/downloads

# Browser Configuration
headless=true

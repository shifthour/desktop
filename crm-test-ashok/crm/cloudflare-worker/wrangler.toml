name = "crm-cron"
main = "src/index.js"
compatibility_date = "2024-07-01"

# Cron triggers - runs every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Environment variables (set via wrangler secret put)
# BASE_URL should be set to your deployed CRM URL
# Example: wrangler secret put BASE_URL

# Optional: Configure custom domain
# routes = [
#   { pattern = "cron.yourcrm.com/*", zone_name = "yourcrm.com" }
# ]

# Optional: Set usage model for predictable costs
# usage_model = "bundled"
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Translation App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>File Translation Application</h1>
        
        <div class="upload-section">
            <label for="fileInput" class="file-label">
                <span class="upload-icon">📁</span>
                <span id="fileName">Choose a file to upload</span>
            </label>
            <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.doc,.rtf,.html,.json,.xml,.csv">
        </div>

        <div class="language-section">
            <div class="language-group">
                <label for="sourceLanguage">Source Language</label>
                <select id="sourceLanguage">
                    <option value="auto">Auto Detect</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="nl">Dutch</option>
                    <option value="pl">Polish</option>
                    <option value="tr">Turkish</option>
                </select>
            </div>

            <div class="arrow">→</div>

            <div class="language-group">
                <label for="targetLanguage">Target Language</label>
                <select id="targetLanguage">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="nl">Dutch</option>
                    <option value="pl">Polish</option>
                    <option value="tr">Turkish</option>
                </select>
            </div>
        </div>

        <div class="action-section">
            <button id="translateBtn" class="btn btn-primary" disabled>Translate File</button>
            <button id="downloadBtn" class="btn btn-secondary" disabled>Download Translated File</button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div id="progressBar" class="progress-bar" style="display: none;">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Spine: gentle S-curve with 4 vertebrae notches -->
  <path d="M200 380 C200 330, 240 310, 240 256 C240 202, 200 182, 200 132"
        stroke="white" stroke-width="32" stroke-linecap="round" fill="none"/>
  <!-- Vertebrae notches -->
  <line x1="184" y1="172" x2="216" y2="158" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="222" y1="226" x2="258" y2="220" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="222" y1="290" x2="258" y2="296" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="184" y1="344" x2="216" y2="354" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Caring hands wrapping around the spine -->
  <!-- Left hand -->
  <path d="M155 200 C110 220, 95 270, 120 310"
        stroke="white" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Right hand -->
  <path d="M285 200 C330 220, 345 270, 320 310"
        stroke="white" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Small plus sign (healthcare) -->
  <line x1="380" y1="100" x2="380" y2="148" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="356" y1="124" x2="404" y2="124" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
</svg>

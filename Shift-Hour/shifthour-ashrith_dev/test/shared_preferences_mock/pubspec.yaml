name: shared_preferences
description: A mock implementation of the shared_preferences plugin for testing.
version: 0.0.1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  plugin_platform_interface: ^2.0.0
  shared_preferences_platform_interface: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter:
    sdk: flutter
flutter:
  plugin:
    platforms:
      android:
        package: io.flutter.plugins.sharedpreferences
        pluginClass: SharedPreferencesPlugin
      ios:
        pluginClass: SharedPreferencesPlugin
      linux:
        pluginClass: SharedPreferencesPlugin
      macos:
        pluginClass: SharedPreferencesPlugin
      web:
        pluginClass: SharedPreferencesPlugin
        fileName: shared_preferences_web.dart
      windows:
        pluginClass: SharedPreferencesPlugin

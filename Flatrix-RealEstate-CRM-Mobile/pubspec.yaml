name: flatrix_crm_mobile
description: "Flatrix Real Estate CRM Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Supabase
  supabase_flutter: ^2.3.0

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.4
  flutter_phone_direct_caller: ^2.1.1
  dbcrypt: ^2.0.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA4 Tracking Test</title>
    
    <!-- Google tag (gtag.js) - Google Analytics 4 & Google Ads -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W6C28DJ6M3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      // Google Analytics 4
      gtag('config', 'G-W6C28DJ6M3');
      
      // Google Ads
      gtag('config', 'AW-17340305414');
    </script>
</head>
<body>
    <h1>GA4 Tracking Test Page</h1>
    <p>This page tests Google Analytics 4 tracking with ID: G-W6C28DJ6M3</p>
    
    <button onclick="testEvent()">Test Event</button>
    
    <h2>Debugging Info:</h2>
    <div id="debug"></div>
    
    <script>
        // Check if gtag is loaded
        window.onload = function() {
            const debugDiv = document.getElementById('debug');
            
            if (typeof gtag !== 'undefined') {
                debugDiv.innerHTML += '<p style="color: green;">✅ gtag is loaded</p>';
                
                // Send a test event
                gtag('event', 'test_event', {
                    'event_category': 'Test',
                    'event_label': 'Initial Load Test'
                });
                
                debugDiv.innerHTML += '<p style="color: green;">✅ Test event sent</p>';
            } else {
                debugDiv.innerHTML += '<p style="color: red;">❌ gtag is NOT loaded</p>';
            }
            
            if (typeof dataLayer !== 'undefined') {
                debugDiv.innerHTML += '<p style="color: green;">✅ dataLayer exists</p>';
                debugDiv.innerHTML += '<p>DataLayer contents: ' + JSON.stringify(dataLayer.slice(-5)) + '</p>';
            }
        };
        
        function testEvent() {
            gtag('event', 'button_click', {
                'event_category': 'Engagement',
                'event_label': 'Test Button'
            });
            alert('Event sent! Check Google Analytics Real-Time reports.');
        }
    </script>
</body>
</html>

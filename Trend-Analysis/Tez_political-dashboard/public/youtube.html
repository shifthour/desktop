<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Trending Videos - YSRCP vs TDP</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .video-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .video-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .party-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 8px;
        }

        .party-badge.ysrcp {
            background: linear-gradient(135deg, #0066CC 0%, #00A651 100%);
            color: white;
        }

        .party-badge.tdp {
            background: linear-gradient(135deg, #FFED00 0%, #FFC20E 100%);
            color: #2d3748;
        }

        .filter-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #f7fafc;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #718096;
        }

        .error-message {
            background: #fed7d7;
            color: #742a2a;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: #3182ce;
        }

        .official-badge {
            background: #48bb78;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">← Back to Dashboard</a>
            <h1>📺 YouTube Trending Videos</h1>
            <p class="subtitle">Real-time political video analytics - YSRCP vs TDP</p>
        </header>

        <div class="stats-summary" id="statsSummary"></div>

        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterVideos('all')">All Videos</button>
            <button class="filter-btn" onclick="filterVideos('ysrcp')">YSRCP</button>
            <button class="filter-btn" onclick="filterVideos('tdp')">TDP</button>
            <button class="filter-btn" onclick="filterVideos('official')">Official Channels</button>
            <button class="filter-btn" onclick="loadData()">🔄 Refresh</button>
        </div>

        <div id="loadingMessage" class="loading">Loading trending videos...</div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div class="video-grid" id="videoGrid"></div>
    </div>

    <script>
        let allVideos = [];
        let currentFilter = 'all';

        async function loadData() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('videoGrid').innerHTML = '';

            try {
                const response = await fetch('/api/youtube/trending');
                const result = await response.json();

                if (result.success) {
                    const data = result.data;

                    // Combine all videos
                    allVideos = [
                        ...data.ysrcp.trending.map(v => ({ ...v, category: 'trending' })),
                        ...data.ysrcp.official.map(v => ({ ...v, category: 'official' })),
                        ...data.tdp.trending.map(v => ({ ...v, category: 'trending' })),
                        ...data.tdp.official.map(v => ({ ...v, category: 'official' }))
                    ];

                    displaySummary(data);
                    filterVideos(currentFilter);
                } else {
                    showError(result.message || 'Failed to load data');
                }
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to connect to server. Please check your YouTube API key in .env file.');
            } finally {
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }

        function displaySummary(data) {
            const summary = document.getElementById('statsSummary');
            summary.innerHTML = `
                <div class="summary-card">
                    <h3>Total Videos</h3>
                    <div class="value">${allVideos.length}</div>
                </div>
                <div class="summary-card">
                    <h3>YSRCP Videos</h3>
                    <div class="value">${data.ysrcp.totalVideos}</div>
                </div>
                <div class="summary-card">
                    <h3>TDP Videos</h3>
                    <div class="value">${data.tdp.totalVideos}</div>
                </div>
                <div class="summary-card">
                    <h3>Total Views</h3>
                    <div class="value">${formatNumber(data.ysrcp.totalViews + data.tdp.totalViews)}</div>
                </div>
            `;
        }

        function filterVideos(filter) {
            currentFilter = filter;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event?.target?.classList.add('active');

            let filtered = allVideos;

            if (filter === 'ysrcp') {
                filtered = allVideos.filter(v => v.party === 'ysrcp');
            } else if (filter === 'tdp') {
                filtered = allVideos.filter(v => v.party === 'tdp');
            } else if (filter === 'official') {
                filtered = allVideos.filter(v => v.isOfficial);
            }

            displayVideos(filtered);
        }

        function displayVideos(videos) {
            const grid = document.getElementById('videoGrid');

            if (videos.length === 0) {
                grid.innerHTML = '<div class="loading">No videos found for this filter.</div>';
                return;
            }

            grid.innerHTML = videos.map(video => `
                <div class="video-card" onclick="openVideo('${video.url}')">
                    <img src="${video.thumbnail}" alt="${video.title}" class="video-thumbnail" onerror="this.src='https://via.placeholder.com/350x200?text=Video'">
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}${video.isOfficial ? '<span class="official-badge">OFFICIAL</span>' : ''}</div>
                        <div class="video-channel">📺 ${escapeHtml(video.channelTitle)}</div>
                        <div class="video-stats">
                            <div class="stat-item">👁 ${formatNumber(video.views)}</div>
                            <div class="stat-item">👍 ${formatNumber(video.likes)}</div>
                            <div class="stat-item">💬 ${formatNumber(video.comments)}</div>
                        </div>
                        <span class="party-badge ${video.party}">${video.party.toUpperCase()}</span>
                    </div>
                </div>
            `).join('');
        }

        function openVideo(url) {
            window.open(url, '_blank');
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Load data on page load
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
